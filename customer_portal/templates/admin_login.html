{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:500px;margin:0 auto 18px">
  <h2>Admin bookings</h2>
  <p class="muted">Enter your admin password to view customer booking requests.</p>
  {% if error %}<div class="flash">{{ error }}</div>{% endif %}
  <form method="post">
    <label>Password</label>
    <input type="password" name="password" required>
    <div style="margin-top:12px"><button type="submit">Open bookings</button></div>
  </form>
</div>
{% endblock %}
